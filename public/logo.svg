<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" role="img" aria-label="Remi logo">
  <defs>
    <linearGradient id="remiGradL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c6fea"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- badge -->
  <rect x="10" y="20" width="100" height="100" rx="26" fill="url(#remiGradL)"/>
  <text x="60" y="71" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="62" font-weight="800" fill="#ffffff">R</text>
  <!-- wordmark -->
  <text x="132" y="71" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="62" font-weight="800" fill="#e2e8f0">Remi</text>
</svg>
