<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Remi">
  <defs>
    <linearGradient id="remiGradP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c6fea"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed gradient so Facebook's circular crop looks clean -->
  <rect width="1000" height="1000" fill="url(#remiGradP)"/>
  <text x="500" y="512" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="600" font-weight="800" fill="#ffffff">R</text>
</svg>
